<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>George Eliot in Weimar (1854) — Story Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
    :root {
        --aug: #e76f51;
        --sep: #f4a261;
        --oct: #2a9d8f;
        --nov: #264653;
        --sidebar-w: 380px;
    }
    html, body { margin: 0; padding: 0; height: 100%; font-family: Georgia, serif; }
    #app { display: flex; height: 100vh; }
    #sidebar {
        width: var(--sidebar-w);
        min-width: var(--sidebar-w);
        overflow-y: auto;
        border-right: 1px solid #ddd;
        background: #fafafa;
    }
    #sidebar header {
        padding: 1.5rem 1.25rem 1rem;
        border-bottom: 1px solid #eee;
        background: white;
        position: sticky; top: 0; z-index: 2;
    }
    #sidebar h1 { margin: 0 0 0.25rem; font-size: 1.15rem; }
    #sidebar .sub { color: #666; font-size: 0.85rem; font-style: italic; }
    #legend { display: flex; gap: 0.75rem; margin-top: 0.75rem; font-size: 0.75rem; }
    #legend span { display: inline-flex; align-items: center; gap: 0.3rem; }
    #legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .stop {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid #eee;
        cursor: pointer;
        transition: background 0.15s;
    }
    .stop:hover { background: #f0efeb; }
    .stop.active { background: #e9e5dc; border-left: 4px solid #333; padding-left: calc(1.25rem - 4px); }
    .stop .meta { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
    .stop .loc { font-weight: bold; margin: 0.25rem 0; font-size: 1rem; }
    .stop .desc { font-size: 0.9rem; line-height: 1.5; color: #333; }
    #map { flex: 1; }
    .leaflet-popup-content { font-family: Georgia, serif; max-width: 280px; }
    .leaflet-popup-content .date { color: #666; font-size: 0.8rem; }
    .leaflet-popup-content .loc { font-weight: bold; margin: 0.25rem 0; }
    .leaflet-popup-content .desc { font-size: 0.85rem; line-height: 1.4; }
    @media (max-width: 768px) {
        #app { flex-direction: column; }
        #sidebar { width: 100%; min-width: 0; max-height: 45vh; border-right: none; border-bottom: 1px solid #ddd; }
        #map { height: 55vh; }
    }
</style>
</head>
<body>
<div id="app">
    <aside id="sidebar">
        <header>
            <h1>George Eliot in Weimar (1854)</h1>
            <div class="sub">A journey reconstructed from her letters and journals</div>
            <div id="legend">
                <span><i class="dot" style="background:var(--aug)"></i>August</span>
                <span><i class="dot" style="background:var(--sep)"></i>September</span>
                <span><i class="dot" style="background:var(--oct)"></i>October</span>
                <span><i class="dot" style="background:var(--nov)"></i>November</span>
            </div>
        </header>
        <div id="stops"></div>
    </aside>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="../QGIS/data/AugustLayer_5.js"></script>
<script src="../QGIS/data/SeptemberLayer_6.js"></script>
<script src="../QGIS/data/OctoberLayer_7.js"></script>
<script src="../QGIS/data/NovemberLayer_8.js"></script>
<script src="../QGIS/data/Paths_1.js"></script>
<script src="../QGIS/data/Paths_2.js"></script>
<script src="../QGIS/data/Paths_3.js"></script>
<script src="../QGIS/data/Paths_4.js"></script>

<script>
const MONTHS = [
    { key: 'aug', label: 'August',    color: '#e76f51', points: json_AugustLayer_5,    paths: json_Paths_1 },
    { key: 'sep', label: 'September', color: '#f4a261', points: json_SeptemberLayer_6, paths: json_Paths_2 },
    { key: 'oct', label: 'October',   color: '#2a9d8f', points: json_OctoberLayer_7,   paths: json_Paths_3 },
    { key: 'nov', label: 'November',  color: '#264653', points: json_NovemberLayer_8,  paths: json_Paths_4 }
];

const map = L.map('map', { zoomControl: true }).setView([50.98, 11.33], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
}).addTo(map);

const markerById = new Map();
const stopsEl = document.getElementById('stops');
const allStops = [];

MONTHS.forEach(m => {
    L.geoJSON(m.paths, {
        style: { color: m.color, weight: 3, opacity: 0.6 }
    }).addTo(map);

    L.geoJSON(m.points, {
        pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
            radius: 6, color: '#fff', weight: 1.5,
            fillColor: m.color, fillOpacity: 0.9
        }),
        onEachFeature: (feature, layer) => {
            const p = feature.properties;
            const popup = `
                <div class="date">${p.Date || ''}</div>
                <div class="loc">${p.Location || 'Unknown'}</div>
                <div class="desc">${p.Description || ''}</div>`;
            layer.bindPopup(popup);
            if (p.id) markerById.set(p.id, { layer, month: m });
            allStops.push({ id: p.id, date: p.Date, location: p.Location, description: p.Description, month: m, layer });
        }
    }).addTo(map);
});

allStops.sort((a, b) => (a.date || '').localeCompare(b.date || ''));

allStops.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'stop';
    el.dataset.idx = i;
    el.style.borderLeftColor = s.month.color;
    el.innerHTML = `
        <div class="meta" style="color:${s.month.color}">${s.date || ''} · ${s.month.label}</div>
        <div class="loc">${s.location || 'Unknown'}</div>
        <div class="desc">${s.description || ''}</div>`;
    el.addEventListener('click', () => focusStop(i));
    stopsEl.appendChild(el);
});

let activeIdx = -1;
function focusStop(i) {
    if (i === activeIdx) return;
    document.querySelectorAll('.stop').forEach(e => e.classList.remove('active'));
    const s = allStops[i];
    if (!s || !s.layer) return;
    const el = stopsEl.children[i];
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    map.flyTo(s.layer.getLatLng(), 14, { duration: 1.2 });
    s.layer.openPopup();
    activeIdx = i;
}

const allBounds = L.featureGroup(allStops.map(s => s.layer)).getBounds();
if (allBounds.isValid()) map.fitBounds(allBounds, { padding: [30, 30] });
</script>
</body>
</html>
